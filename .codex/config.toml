[agents]
max_threads = 4
max_depth = 1

[agents.explorer]
description = "Read-only codebase explorer for gathering evidence before changes are proposed."
config_file = "agents/explorer.toml"

[agents.explorer_fallback]
description = "Fallback read-only explorer when spark usage is constrained or unavailable."
config_file = "agents/explorer-fallback.toml"

[agents.reviewer]
description = "Read-only reviewer focused on correctness, regressions, security, and missing tests."
config_file = "agents/reviewer.toml"

[agents.docs_researcher]
description = "Read-only documentation specialist for verifying framework and API behavior from official sources."
config_file = "agents/docs-researcher.toml"

[agents.planner]
description = "Planning-focused writer for bounded discovery, tracked plan artifacts, and execution-ready handoffs."
config_file = "agents/planner.toml"

[agents.worker]
description = "Implementation-focused role for narrow, disjoint write scopes once the task is understood."
config_file = "agents/worker.toml"

[agents.monitor]
description = "Long-running command and polling role for status checks and verification waits."
config_file = "agents/monitor.toml"

[agents.monitor_fallback]
description = "Fallback monitoring role for waits and polling when spark usage is constrained or unavailable."
config_file = "agents/monitor-fallback.toml"
