# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json

reviews:
  profile: "assertive"
  review_details: true
  collapse_walkthrough: true
  in_progress_fortune: false
  poem: false
  auto_review:
    enabled: false
  path_filters:
    - "!**/.worktrees/**"
    - "!**/worktrees/**"
    - "!**/.agent/**"
    - "!**/.codanna/**"
    - "!**/.codex/cache/**"
    - "!**/.fastembed_cache/**"
    - "!**/.mcp_sequential_thinking/**"
    - "!docs/runs/**"
    - "!**/.DS_Store"
  path_instructions:
    - path: "AGENTS.md"
      instructions: |
        Review this as stable Desktop control-plane policy. Flag contradictions with docs/AGENTIC_DEV_WORKFLOW.md, docs/agentic/plan-authoring-standard.md, repo-local skill policy, and verification routing.
    - path: "docs/AGENTIC_DEV_WORKFLOW.md"
      instructions: |
        Review this as the operational runbook. Prioritize stale guidance, duplicate authority, missing verification routing, and process overhead that does not improve execution quality.
    - path: "docs/agentic/**"
      instructions: |
        Review these as the Desktop agent-control plane. Flag contradictions, stale links, local-only leakage, mismatch with tools/verify-docs.mjs, and guidance that would encourage low-quality implementation.
    - path: ".agents/skills/**/*.md"
      instructions: |
        Review project skills as thin wrappers over tracked launchers or architecture docs. Flag duplicated policy, stale paths, and missing read order.
    - path: ".codex/**"
      instructions: |
        Review Codex role config for role clarity, read-only boundaries, and over-broad delegation. Flag obsolete role names or roles that encourage speculative implementation.
    - path: "tools/verify-docs.mjs"
      instructions: |
        Review this as a workflow contract verifier. Prefer structural guardrails over exact prose checks and flag any rule that either misses a real control-plane invariant or adds brittle ceremony.
    - path: "tools/verify-redaction.mjs"
      instructions: |
        Review redaction checks against the Desktop security model. Flag gaps that could allow raw Plex tokens, auth headers, tokenized URLs, native handles, or secret-bearing logs into tracked files.
    - path: "tools/architecture-rules/**"
      instructions: |
        Review architecture lint rules for the Electron security model. Flag missing renderer/preload/main/native-helper boundary checks and over-broad rules that would block reasonable implementation.
    - path: "src/contracts/**"
      instructions: |
        Review contracts for renderer safety, explicit ownership, stable public shapes, and redaction behavior. Flag privileged fields crossing renderer-facing boundaries.
    - path: "src/renderer/**"
      instructions: |
        Review renderer code as unprivileged UI. Flag Node/Electron imports, persistent secrets, token-bearing data, native handles, or policy that belongs in main/helper/domain owners.
    - path: "src/preload/**"
      instructions: |
        Review preload as a narrow typed bridge. Flag broad RPC, raw ipcRenderer exposure, missing unsubscribe paths, missing validation, or secret-bearing payloads.
    - path: "src/main/**"
      instructions: |
        Review Electron main for window lifecycle, IPC authorization, secure storage, redacted diagnostics, and thin composition. Flag UI policy, renderer implementation imports, or broad catch-all services.
    - path: "src/native-helper/**"
      instructions: |
        Review native helper code for playback isolation, crash handling, command/event contracts, and log filtering. Flag renderer coupling or unsanitized media/secret logs.
    - path: "src/**/*.test.ts"
      instructions: |
        Review tests for public contracts and realistic behavior. Flag brittle private probes, broad snapshots, missing security assertions, and tests that encode implementation trivia.

knowledge_base:
  code_guidelines:
    enabled: true
    filePatterns:
      - "AGENTS.md"
      - "docs/AGENTIC_DEV_WORKFLOW.md"
      - "docs/architecture/CURRENT_STATE.md"
      - "docs/architecture/security-and-secret-flow.md"
      - "docs/architecture/playback-architecture.md"
      - "docs/agentic/plan-authoring-standard.md"
